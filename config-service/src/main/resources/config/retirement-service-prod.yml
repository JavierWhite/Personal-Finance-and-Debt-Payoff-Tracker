server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/finance_retirement?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

finance:
  security:
    issuer: personal-finance-tracker
    jwt-secret: ${JWT_SECRET:dev-only-change-this-secret-key-for-class-demo}
    token-minutes: ${JWT_TOKEN_MINUTES:120}
